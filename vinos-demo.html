<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta de vinos · O Lagar de José</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#2f5138; --verde-2:#1e3a29;
    --pergamino:#f4eedd; --musgo:#e2e5d2; --linea:#e0d8c2;
    --dorado:#c99a3a; --dorado-claro:#E9DFC0; --vino:#7c2b34;
    --tinta:#33302a; --taupe:#7d745f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ background:var(--pergamino); color:var(--tinta); font-family:'Inter',sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
  .home-btn{
    position:absolute; top:16px; left:16px; z-index:5;
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
    color:var(--pergamino); text-decoration:none;
    background:rgba(255,255,255,.10); border:1px solid rgba(233,223,192,.28); border-radius:999px; padding:7px 13px;
    transition:background .2s, transform .12s ease;
  }
  .home-btn:hover{ background:rgba(255,255,255,.18); }
  .home-btn:active{ transform:scale(.96); }

  .hero{
    position:relative; text-align:center; color:var(--pergamino);
    background:radial-gradient(120% 140% at 50% -10%, #234433 0%, var(--verde) 45%, var(--verde-2) 100%);
    padding:52px 24px 40px;
  }
  .hero .eyebrow{ font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--dorado-claro); font-weight:600; }
  .hero h1{ font-family:'Fraunces',serif; font-weight:600; font-size:34px; margin:10px 0 6px; }
  .hero .sub{ font-family:'Fraunces',serif; font-style:italic; font-size:14px; color:#d9caa0; }

  main{ max-width:620px; margin:0 auto; padding:28px 18px 40px; }
  .group-title{ font-family:'Fraunces',serif; font-weight:600; color:var(--verde); font-size:22px; margin:22px 0 4px; }
  .group-title:first-child{ margin-top:4px; }
  .group-rule{ height:1px; background:var(--linea); margin-bottom:6px; }

  .wine{
    display:flex; align-items:center; gap:12px;
    padding:14px 6px; border-bottom:1px dashed var(--linea);
    cursor:pointer; text-align:left; width:100%; background:none; border-left:none; border-right:none; border-top:none;
    transition:background .15s;
  }
  .wine:hover{ background:rgba(201,154,58,.06); }
  .wine .info{ flex:1; }
  .wine .nom{ font-family:'Fraunces',serif; font-weight:600; font-size:17px; color:var(--tinta); }
  .wine .do{ font-size:12.5px; color:var(--taupe); margin-top:2px; }
  .wine .precio{ font-family:'Fraunces',serif; font-weight:600; font-size:16px; color:var(--vino); white-space:nowrap; }
  .wine .chev{ color:var(--dorado); font-size:18px; margin-left:2px; }

  /* ---------- FICHA (modal) ---------- */
  .modal{ position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; padding:18px; }
  .modal[hidden]{ display:none; }
  .modal-bg{ position:absolute; inset:0; background:rgba(30,58,41,.55); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); animation:fade .25s ease; }
  .card{
    position:relative; z-index:1; width:100%; max-width:420px; max-height:90vh; overflow-y:auto;
    background:#fffdf6; border-radius:12px; box-shadow:0 20px 60px rgba(30,58,41,.35);
    padding:26px 22px 24px; animation:pop .28s cubic-bezier(.22,.61,.36,1);
  }
  .close{
    position:absolute; top:12px; right:12px; width:32px; height:32px; border-radius:50%;
    border:1px solid var(--linea); background:#fff; color:var(--taupe); font-size:18px; line-height:1; cursor:pointer;
  }
  .close:active{ transform:scale(.92); }
  .detail-head{ display:flex; align-items:center; gap:16px; }
  .detail-head .txt h3{ font-family:'Fraunces',serif; font-weight:600; font-size:23px; color:var(--verde); line-height:1.1; }
  .detail-head .txt .do2{ font-size:13px; color:var(--taupe); margin-top:3px; }
  .detail-head .txt .uva{ display:inline-block; margin-top:8px; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--dorado); font-weight:600; }

  .radar-title{ text-align:center; font-size:11px; text-transform:uppercase; letter-spacing:.2em; color:var(--taupe); margin:16px 0 2px; }
  .radar-wrap{ display:flex; justify-content:center; }

  .meta{ display:flex; gap:10px; margin-top:14px; }
  .meta div{ flex:1; background:var(--musgo); border-radius:8px; padding:9px 10px; text-align:center; }
  .meta .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--verde); font-weight:600; }
  .meta .val{ font-family:'Fraunces',serif; font-size:15px; color:var(--tinta); margin-top:2px; }
  .desc{ font-size:14px; line-height:1.6; color:var(--tinta); margin-top:14px; }
  .maridaje{ font-size:13px; color:var(--taupe); margin-top:10px; }
  .maridaje b{ color:var(--verde); }
  .precio-full{ text-align:center; font-family:'Fraunces',serif; font-weight:600; color:var(--vino); font-size:18px; margin-top:16px; }

  footer{ text-align:center; padding:22px 18px 40px; font-size:12.5px; color:var(--taupe); line-height:1.7; }
  footer .tel{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; color:var(--verde); }

  @keyframes fade{ from{ opacity:0;} to{ opacity:1;} }
  @keyframes pop{ from{ opacity:0; transform:translateY(12px) scale(.97);} to{ opacity:1; transform:none;} }
  @media (prefers-reduced-motion: reduce){ .modal-bg, .card{ animation:none; } }
</style>
</head>
<body>
  <div class="hero">
    <a class="home-btn" href="index.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Inicio
    </a>
    <div class="eyebrow">O Lagar de José</div>
    <h1>Carta de vinos</h1>
    <div class="sub">Toca un vino para ver su cata</div>
  </div>

  <main id="lista"></main>

  <div class="modal" id="modal" hidden>
    <div class="modal-bg" data-close></div>
    <div class="card" id="card"></div>
  </div>

  <footer>
    <span class="tel">981 132 333</span> · Calle Pose 25 · A Coruña
  </footer>

<script>
  /* === DATOS DE EJEMPLO — luego los cambias por tus vinos reales ===
     cata = [Cuerpo, Acidez, Fruta, Dulzor, Taninos, Final]  (valores 0 a 5) */
  const WINES = [
    { tipo:'Blancos', nom:'Sucellos', do:'D.O. Rías Baixas', uva:'Albariño', temp:'8–10 °C', copa:'3,20 €', bot:'18 €',
      desc:'Fresco y aromático, con fruta blanca, flores y un final salino muy gallego.', mar:'Marisco, pulpo, pescados a la plancha',
      cata:[3,4,5,2,0,4] },
    { tipo:'Blancos', nom:'Godello da casa', do:'D.O. Valdeorras', uva:'Godello', temp:'9–11 °C', copa:'3,00 €', bot:'16 €',
      desc:'Con cuerpo y buena estructura, notas de fruta madura y un punto mineral.', mar:'Pescados al horno, arroces',
      cata:[4,3,4,1,0,4] },
    { tipo:'Tintos', nom:'Mencía da terra', do:'D.O. Ribeira Sacra', uva:'Mencía', temp:'14–16 °C', copa:'3,20 €', bot:'17 €',
      desc:'Ligero y afrutado, con taninos suaves y un final fresco. Muy fácil de beber.', mar:'Carnes, guisos, quesos curados',
      cata:[3,4,4,1,3,4] },
  ];

  const LABELS = ['Cuerpo','Acidez','Fruta','Dulzor','Taninos','Final'];

  function radar(vals){
    const cx=130, cy=128, R=84, N=6, max=5;
    const ang=i=> (-90 + i*360/N) * Math.PI/180;
    const pt=(i,r)=> [cx + r*Math.cos(ang(i)), cy + r*Math.sin(ang(i))];
    let g='';
    for(let ring=1; ring<=max; ring++){
      const rr=R*ring/max; let p='';
      for(let i=0;i<N;i++){ const [x,y]=pt(i,rr); p+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1); }
      g+=`<path d="${p}Z" fill="none" stroke="var(--linea)" stroke-width="1" opacity="${ring===max?'.9':'.5'}"/>`;
    }
    for(let i=0;i<N;i++){
      const [x,y]=pt(i,R);
      g+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--linea)" stroke-width="1" opacity=".6"/>`;
      const [lx,ly]=pt(i,R+17);
      g+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="600" font-family="Inter,sans-serif" fill="var(--taupe)">${LABELS[i]}</text>`;
    }
    let dp='';
    for(let i=0;i<N;i++){ const [x,y]=pt(i, R*vals[i]/max); dp+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1); }
    g+=`<path d="${dp}Z" fill="var(--vino)" fill-opacity=".18" stroke="var(--vino)" stroke-width="2" stroke-linejoin="round"/>`;
    for(let i=0;i<N;i++){ const [x,y]=pt(i, R*vals[i]/max); g+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.2" fill="var(--dorado)"/>`; }
    return `<svg viewBox="0 0 260 256" width="100%" style="max-width:290px" role="img" aria-label="Estrella de cata">${g}</svg>`;
  }

  function bottle(tipo){
    const glass = tipo==='Tintos' ? '#5b2130' : '#3f6b4a';
    return `<svg viewBox="0 0 60 150" width="42" aria-hidden="true">
      <rect x="25.5" y="4" width="9" height="7" rx="1.5" fill="#7a5a34"/>
      <rect x="25" y="10" width="10" height="26" fill="${glass}"/>
      <path d="M22 34 Q22 46 18 54 Q14 62 14 80 L14 138 Q14 146 22 146 L38 146 Q46 146 46 138 L46 80 Q46 62 42 54 Q38 46 38 34 Z" fill="${glass}"/>
      <rect x="16.5" y="92" width="27" height="34" rx="2" fill="#fffdf6" opacity=".93"/>
      <rect x="20" y="100" width="20" height="2" rx="1" fill="${glass}" opacity=".5"/>
      <rect x="22" y="106" width="16" height="1.6" rx=".8" fill="${glass}" opacity=".35"/>
    </svg>`;
  }

  function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  // Construir la lista agrupada por tipo
  const lista = document.getElementById('lista');
  const tipos = [...new Set(WINES.map(w=>w.tipo))];
  tipos.forEach(tipo=>{
    const t=document.createElement('div'); t.className='group-title'; t.textContent=tipo; lista.appendChild(t);
    const r=document.createElement('div'); r.className='group-rule'; lista.appendChild(r);
    WINES.filter(w=>w.tipo===tipo).forEach(w=>{
      const b=document.createElement('button'); b.className='wine';
      b.innerHTML = `<div class="info"><div class="nom">${esc(w.nom)}</div><div class="do">${esc(w.do)} · ${esc(w.uva)}</div></div>`
                  + `<div class="precio">${esc(w.bot)}</div><div class="chev">›</div>`;
      b.addEventListener('click', ()=>abrir(w));
      lista.appendChild(b);
    });
  });

  const modal=document.getElementById('modal'), card=document.getElementById('card');
  function abrir(w){
    card.innerHTML = `
      <button class="close" data-close aria-label="Cerrar">×</button>
      <div class="detail-head">
        ${bottle(w.tipo)}
        <div class="txt">
          <h3>${esc(w.nom)}</h3>
          <div class="do2">${esc(w.do)}</div>
          <span class="uva">${esc(w.uva)}</span>
        </div>
      </div>
      <div class="radar-title">Estrella de cata</div>
      <div class="radar-wrap">${radar(w.cata)}</div>
      <div class="meta">
        <div><div class="lbl">Temperatura</div><div class="val">${esc(w.temp)}</div></div>
        <div><div class="lbl">Copa</div><div class="val">${esc(w.copa)}</div></div>
        <div><div class="lbl">Botella</div><div class="val">${esc(w.bot)}</div></div>
      </div>
      <div class="desc">${esc(w.desc)}</div>
      <div class="maridaje"><b>Marida con:</b> ${esc(w.mar)}</div>`;
    modal.hidden=false; document.body.style.overflow='hidden';
  }
  function cerrar(){ modal.hidden=true; document.body.style.overflow=''; }
  modal.addEventListener('click', e=>{ if(e.target.hasAttribute('data-close')) cerrar(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape' && !modal.hidden) cerrar(); });
</script>
</body>
</html>
